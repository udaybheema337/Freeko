<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Orders</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div style="display:flex; align-items:center;">
            <button class="back-btn" onclick="window.location.href='index.html'">←</button>
            <h1>Order History</h1>
        </div>
    </nav>

    <div class="container" id="history-list">Loading...</div>

    <script type="module">
        import { db, auth } from "./js/config.js";
        import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) return window.location.href = "login.html";

            const container = document.getElementById("history-list");
            const q = query(collection(db, "orders"), where("userId", "==", user.uid), orderBy("timestamp", "desc"));
            const snapshot = await getDocs(q);

            if (snapshot.empty) {
                container.innerHTML = "<p style='text-align:center; margin-top:50px;'>No past orders found.</p>";
                return;
            }

            container.innerHTML = ""; 

            snapshot.forEach(doc => {
                const order = doc.data();
                const date = order.timestamp.toDate().toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
                const itemText = order.cart.map(i => `${i.name} (${i.qty})`).join(", ");
                
                // Color Logic
                let statusColor = "#eee";
                if(order.status === "Delivered") statusColor = "#d4edda";
                if(order.status === "Assigned") statusColor = "#fff3cd";

                // ACTION BUTTON LOGIC: Track if Active, Reorder if Done
                let actionBtn = "";
                if (order.status !== 'Delivered' && order.status !== 'Cancelled') {
                    actionBtn = `<button onclick="window.location.href='tracking.html'" style="background:#e8f5e9; color:#0c831f; border:1px solid #0c831f; padding:6px 15px; border-radius:20px; font-weight:bold; font-size:13px;">📍 Track</button>`;
                } else {
                    actionBtn = `<button onclick='reorder(${JSON.stringify(order.cart)})' style="background:white; border:1px solid #0c831f; color:#0c831f; padding:6px 15px; border-radius:20px; font-weight:bold; font-size:13px;">🔄 Re-Order</button>`;
                }

                container.innerHTML += `
                    <div class="cart-item" style="display:block;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                            <strong style="color:#333;">📅 ${date}</strong>
                            <span style="background:${statusColor}; padding:3px 8px; border-radius:4px; font-size:12px; font-weight:bold;">${order.status}</span>
                        </div>
                        <p style="color:#666; font-size:14px; margin-bottom:10px; line-height:1.4;">${itemText}</p>
                        <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #eee; padding-top:10px;">
                            <span style="font-weight:800; color:#333;">Total: ₹${order.total}</span>
                            ${actionBtn}
                        </div>
                    </div>
                `;
            });
        });

        window.reorder = (oldCart) => {
            if(confirm("Add these items to cart?")) {
                localStorage.setItem("cart", JSON.stringify(oldCart));
                window.location.href = "cart.html";
            }
        };
    </script>
</body>
</html>
