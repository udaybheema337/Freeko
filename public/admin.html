<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master | FreshKart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="/manifest.json">
    <style>
        /* Admin Navigation Tabs */
        .tab-bar { display: flex; margin-bottom: 20px; background: white; padding: 5px; border-radius: 8px; gap: 5px; }
        .tab-btn { flex: 1; background: transparent; color: #555; border: none; padding: 12px; cursor: pointer; border-radius: 5px; font-weight: 600; font-size: 13px; }
        .tab-btn.active { background: #0c831f; color: white; shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .hidden { display: none; }

        /* Date Grouping Headers */
        .date-header {
            background: #2c3e50; color: white; padding: 10px 15px; 
            border-radius: 6px; margin-top: 25px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-delete-day { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* Order Card Styles */
        .order-card { margin-bottom: 15px; padding: 15px; border-radius: 8px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: background-color 0.3s ease; }
        .assign-box { background: rgba(255,255,255,0.5); padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px dashed #ccc; }

        /* Product & Team Styles */
        .list-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 10px; border-bottom: 1px solid #eee; }
        .stock-badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .in { background: #d4edda; color: #155724; }
        .out { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <nav>
        <h1>👨‍💼 Admin Master</h1>
        <button onclick="logout()" style="background:#333; width:auto; font-size:12px;">Logout</button>
    </nav>

    <div class="container" style="max-width: 850px;">
        
        <div class="tab-bar">
            <button class="tab-btn active" onclick="showTab('orders')" id="btn-orders">📅 Orders</button>
            <button class="tab-btn" onclick="showTab('team')" id="btn-team">🚚 Team</button>
            <button class="tab-btn" onclick="showTab('analysis')" id="btn-analysis">📊 Analysis</button>
            <button class="tab-btn" onclick="showTab('products')" id="btn-products">🥦 Products</button>
        </div>

        <div id="tab-orders">
            <div id="orders-list">Loading...</div>
        </div>

        <div id="tab-team" class="hidden">
            <div class="card" style="background:#e8f6f3; border: 1px solid #d1f2eb; margin-bottom:20px;">
                <h3 style="margin-bottom:10px; color:#0e6251;">➕ Add Delivery Partner</h3>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <input type="text" id="dName" placeholder="Name" style="flex:1; padding:10px; border:1px solid #ccc; border-radius:5px;">
                    <input type="tel" id="dPhone" placeholder="Mobile Number" style="flex:1; padding:10px; border:1px solid #ccc; border-radius:5px;">
                    <input type="number" id="dPin" placeholder="4-Digit PIN" style="width:100px; padding:10px; border:1px solid #ccc; border-radius:5px;">
                    <button onclick="addAgent()" style="background:#1abc9c; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">Add</button>
                </div>
            </div>
            <h3>🚀 Delivery Team</h3>
            <div id="team-list"></div>
        </div>

        <div id="tab-analysis" class="hidden">
            <div class="card" style="background:#fff3cd; border:1px solid #ffeeba; color:#856404;">
                <h3>📦 Packing List</h3>
                <p>Total items for <strong>Pending</strong> orders.</p>
            </div>
            <div id="analysis-list" style="margin-top:15px;">Calculating...</div>
        </div>

        <div id="tab-products" class="hidden">
            <div class="card" style="background:#f9fdfa; border: 1px solid #cbf3dcb0; margin-bottom:20px;">
                <h3 id="form-title" style="margin-bottom:10px;">➕ Add Product</h3>
                <input type="hidden" id="prodId">
                <input type="text" id="pName" placeholder="Product Name" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
                <input type="number" id="pPrice" placeholder="Price (₹)" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
                <input type="text" id="pImg" placeholder="Image URL" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
                
                 <select id="pCat" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px; background:white;">
                    <option value="Vegetables">🥦 Vegetables</option>
                    <option value="Roots">🥕 Roots</option>
                    <option value="Leafs">🥬 Leafs</option>
                    <option value="Fruits">🍎 Fruits</option>
                    <option value="Flowers">💐 Flowers</option>
                </select>

                <div style="margin-bottom:15px;"><input type="checkbox" id="pStock" checked> <label for="pStock">In Stock</label></div>
                <div style="display:flex; gap:10px;">
                    <button onclick="saveProduct()" id="saveBtn" style="background:#0c831f; flex:1;">Save</button>
                    <button onclick="resetForm()" id="cancelBtn" style="background:#7f8c8d; display:none;">Cancel</button>
                </div>
            </div>
            <div id="products-list"></div>
        </div>

    </div>
    <style>
    /* ... existing styles ... */

    /* Bulk Action Bar */
    .bulk-bar {
        position: fixed; bottom: -100px; left: 0; width: 100%;
        background: #2c3e50; color: white;
        padding: 15px 20px;
        display: flex; justify-content: space-between; align-items: center;
        transition: bottom 0.3s ease;
        box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
        z-index: 1000;
    }
    .bulk-bar.active { bottom: 0; }

    /* Checkbox Style */
    .order-checkbox {
        width: 20px; height: 20px; margin-right: 15px;
        accent-color: #0c831f; cursor: pointer;
    }
    
    .bulk-select {
        padding: 10px; border-radius: 4px; border: none; margin-right: 10px;
    }
</style>

<div id="bulk-bar" class="bulk-bar">
    <div>
        <span id="selected-count" style="font-weight:bold; font-size:16px;">0</span> Orders Selected
    </div>
    <div style="display:flex; align-items:center;">
        <select id="bulk-driver-select" class="bulk-select">
            <option value="">Select Partner...</option>
            </select>
        <button onclick="assignBulk()" style="background:#27ae60; color:white; border:none; padding:10px 20px; border-radius:4px; font-weight:bold; cursor:pointer;">
            Assign All
        </button>
    </div>
</div>

    <script type="module" src="js/admin.js"></script>

</body>
</html>
